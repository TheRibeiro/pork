<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc0cb"/>
      <stop offset="100%" style="stop-color:#ff85a2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Pig face -->
  <circle cx="50" cy="52" r="28" fill="#ffb6c1"/>
  <!-- Ears -->
  <ellipse cx="30" cy="32" rx="10" ry="12" fill="#ffb6c1"/>
  <ellipse cx="70" cy="32" rx="10" ry="12" fill="#ffb6c1"/>
  <ellipse cx="30" cy="32" rx="6" ry="8" fill="#ff9eb5"/>
  <ellipse cx="70" cy="32" rx="6" ry="8" fill="#ff9eb5"/>
  <!-- Snout -->
  <ellipse cx="50" cy="58" rx="14" ry="10" fill="#ff9eb5"/>
  <!-- Nostrils -->
  <ellipse cx="45" cy="58" rx="3" ry="4" fill="#d87093"/>
  <ellipse cx="55" cy="58" rx="3" ry="4" fill="#d87093"/>
  <!-- Eyes -->
  <circle cx="40" cy="46" r="5" fill="#333"/>
  <circle cx="60" cy="46" r="5" fill="#333"/>
  <circle cx="41" cy="44" r="2" fill="#fff"/>
  <circle cx="61" cy="44" r="2" fill="#fff"/>
  <!-- Blush -->
  <ellipse cx="30" cy="54" rx="6" ry="4" fill="#ffccd5" opacity="0.6"/>
  <ellipse cx="70" cy="54" rx="6" ry="4" fill="#ffccd5" opacity="0.6"/>
</svg>
